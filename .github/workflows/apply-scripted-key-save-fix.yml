name: apply-scripted-key-save-fix

on:
  push:
    paths:
      - '.github/workflows/apply-scripted-key-save-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch scripted install key persistence
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('inc/InstallProtocolManager.php')
          text = path.read_text()
          old1 = """                    'extras' => [\n                        'password' => $password,\n                        'client_id' => $clientId,\n                        'result' => $res,\n"""
          new1 = """                    'extras' => [\n                        'vpn_port' => $port,\n                        'server_public_key' => $res['server_public_key'] ?? null,\n                        'preshared_key' => $res['preshared_key'] ?? null,\n                        'password' => $password,\n                        'client_id' => $clientId,\n                        'result' => $res,\n"""
          if new1 not in text:
              if old1 not in text:
                  raise SystemExit('config extras block not found')
              text = text.replace(old1, new1, 1)
          old2 = """                if ($isFirstProtocol) {\n                    self::markServerActive($serverId, null, ['vpn_port' => $port]);\n                }\n"""
          new2 = """                if ($isFirstProtocol) {\n                    self::markServerActive($serverId, null, [\n                        'vpn_port' => $port,\n                        'server_public_key' => $res['server_public_key'] ?? null,\n                        'preshared_key' => $res['preshared_key'] ?? null,\n                    ]);\n                }\n"""
          if new2 not in text:
              if old2 not in text:
                  raise SystemExit('markServerActive block not found')
              text = text.replace(old2, new2, 1)
          path.write_text(text)
          PY
      - name: Validate PHP syntax
        run: php -l inc/InstallProtocolManager.php
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add inc/InstallProtocolManager.php
          git commit -m "Persist scripted WireGuard install keys"
          git push
