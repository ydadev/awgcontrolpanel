name: Apply raw WireGuard client view

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-raw-wireguard-client-view.yml
      - tools/patch_raw_wireguard_client_view.py

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply patch
        run: python3 tools/patch_raw_wireguard_client_view.py

      - name: Validate PHP syntax
        run: php -l public/index.php

      - name: Validate whitespace
        run: git diff --check

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.php templates/clients/view.twig
          git commit -m "Add raw WireGuard client configs"
          git push
