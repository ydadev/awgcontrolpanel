name: Bootstrap from upstream

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-from-upstream.yml
      - .github/bootstrap/patch.gz.b64.*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild repository from upstream snapshot
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit="dfe0f1cbc7fd16c327d3fac503d26bfab81b47ce"
          workdir="$(pwd)"
          upstream_dir="$(mktemp -d)"

          git init "$upstream_dir"
          git -C "$upstream_dir" remote add origin https://github.com/infosave2007/amneziavpnphp.git
          git -C "$upstream_dir" fetch --depth 1 origin "$upstream_commit"
          git -C "$upstream_dir" checkout --detach FETCH_HEAD

          cat .github/bootstrap/patch.gz.b64.* > /tmp/current.patch.gz.b64
          base64 -d /tmp/current.patch.gz.b64 > /tmp/current.patch.gz
          gzip -d -c /tmp/current.patch.gz > /tmp/current.patch

          find "$workdir" -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name .github \
            -exec rm -rf {} +

          cp -a "$upstream_dir"/. "$workdir"/
          rm -rf "$workdir/.git"

          git apply --check --whitespace=nowarn /tmp/current.patch
          git apply --whitespace=nowarn /tmp/current.patch

          rm -rf .github/bootstrap .github/workflows/bootstrap-from-upstream.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Prepare AWG Control Panel baseline"
          git push origin HEAD:main
