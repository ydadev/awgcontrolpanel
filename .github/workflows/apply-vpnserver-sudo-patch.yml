name: apply-vpnserver-sudo-patch

on:
  push:
    paths:
      - '.github/workflows/apply-vpnserver-sudo-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply sudo wrapper patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('inc/VpnServer.php')
          text = path.read_text()
          needle = """            $needsSudo = ($sudo ?? false) && strtolower((string) ($this->data['username'] ?? '')) !== 'root';\n            if ($needsSudo) {\n                // Suppress sudo prompt text to keep command output machine-parseable.\n                $command = \"echo '{$this->data['password']}' | sudo -S -p '' \" . $command;\n            }\n\n            $preparedCommand = $pathPrefix . $command;\n"""
          replacement = """            $needsSudo = ($sudo ?? false) && strtolower((string) ($this->data['username'] ?? '')) !== 'root';\n            $preparedCommand = $pathPrefix . $command;\n            if ($needsSudo) {\n                // Suppress sudo prompt text and run the whole payload under sudo.\n                // This keeps heredoc/multiline scripts from stealing sudo's stdin.\n                $passwordArg = escapeshellarg((string) $this->data['password'] . \"\\\\n\");\n                $payloadArg = escapeshellarg($preparedCommand);\n                $preparedCommand = \"printf %s {$passwordArg} | sudo -S -p '' bash -lc {$payloadArg}\";\n            }\n\n"""
          if replacement not in text:
              if needle not in text:
                  raise SystemExit('target block not found')
              text = text.replace(needle, replacement, 1)
          path.write_text(text)
          PY
      - name: Validate PHP syntax
        run: php -l inc/VpnServer.php
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add inc/VpnServer.php
          git commit -m "Fix sudo execution for multiline SSH commands"
          git push
