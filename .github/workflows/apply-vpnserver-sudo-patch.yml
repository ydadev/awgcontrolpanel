name: apply-vpnserver-sudo-patch

on:
  push:
    paths:
      - '.github/workflows/apply-vpnserver-sudo-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix password newline escape
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('inc/VpnServer.php')
          text = path.read_text()
          bad = '$passwordArg = escapeshellarg((string) $this->data[\'password\'] . "\\\\n");'
          good = '$passwordArg = escapeshellarg((string) $this->data[\'password\'] . "\\n");'
          if bad in text:
              text = text.replace(bad, good, 1)
          elif good not in text:
              raise SystemExit('passwordArg line not found')
          path.write_text(text)
          PY
      - name: Validate PHP syntax
        run: php -l inc/VpnServer.php
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add inc/VpnServer.php
          git commit -m "Fix sudo password newline escape"
          git push
