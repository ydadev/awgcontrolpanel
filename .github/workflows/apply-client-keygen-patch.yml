name: apply-client-keygen-patch

on:
  push:
    paths:
      - .github/workflows/apply-client-keygen-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: python3 tools/patch_client_keygen.py
      - name: Lint PHP
        run: php -l inc/VpnClient.php
      - name: Commit and push
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add inc/VpnClient.php
          git commit -m "Fix client key generation on test installs"
          git push
