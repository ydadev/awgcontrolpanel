name: patch-install-hard-errors

on:
  push:
    paths:
      - .github/workflows/patch-install-hard-errors.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch installer hard error detection
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('inc/InstallProtocolManager.php')
          text = path.read_text()
          old = """                'host key verification failed',\n                'timed out',\n                'operation timed out',\n            ];\n"""
          new = """                'host key verification failed',\n                'timed out',\n                'operation timed out',\n                'failed to build',\n                'did not complete successfully',\n                'exit code:',\n                'unbound variable',\n            ];\n"""
          if new in text:
              raise SystemExit('already patched')
          if old not in text:
              raise SystemExit('target block not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Lint PHP
        run: php -l inc/InstallProtocolManager.php
      - name: Commit and push
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add inc/InstallProtocolManager.php
          git commit -m "Detect scripted install build failures"
          git push
