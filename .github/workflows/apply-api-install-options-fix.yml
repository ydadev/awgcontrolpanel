name: apply-api-install-options-fix

on:
  push:
    paths:
      - '.github/workflows/apply-api-install-options-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch API protocol install options
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('public/index.php')
          text = path.read_text()
          old = """    $protocolId = isset($input['protocol_id']) ? (int) $input['protocol_id'] : 0;\n\n    if ($protocolId <= 0) {\n"""
          new = """    $protocolId = isset($input['protocol_id']) ? (int) $input['protocol_id'] : 0;\n    $installOptions = [];\n    foreach (['install_options', 'options'] as $optionsKey) {\n        if (isset($input[$optionsKey]) && is_array($input[$optionsKey])) {\n            $installOptions = array_merge($installOptions, $input[$optionsKey]);\n        }\n    }\n    foreach (['server_port', 'container_name', 'decision_token', 'decision_mode', 'skip_backup'] as $optionKey) {\n        if (array_key_exists($optionKey, $input)) {\n            $installOptions[$optionKey] = $input[$optionKey];\n        }\n    }\n    if (isset($installOptions['server_port'])) {\n        $installOptions['server_port'] = (int) $installOptions['server_port'];\n        if ($installOptions['server_port'] <= 0) {\n            unset($installOptions['server_port']);\n        }\n    }\n\n    if ($protocolId <= 0) {\n"""
          if new not in text:
              if old not in text:
                  raise SystemExit('protocol_id insertion point not found')
              text = text.replace(old, new, 1)
          old_call = """        $result = InstallProtocolManager::activate($server, $protocol, []);"""
          new_call = """        $result = InstallProtocolManager::activate($server, $protocol, $installOptions);"""
          if new_call not in text:
              if old_call not in text:
                  raise SystemExit('activate call not found')
              text = text.replace(old_call, new_call, 1)
          path.write_text(text)
          PY
      - name: Validate PHP syntax
        run: php -l public/index.php
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add public/index.php
          git commit -m "Allow API protocol install options"
          git push
