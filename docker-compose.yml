services:
  db:
    image: mysql:8.0
    container_name: amnezia-panel-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in .env}
      MYSQL_USER: ${DB_USERNAME:?Set DB_USERNAME in .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amnezia-panel-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      dind:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in .env}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DOCKER_HOST: tcp://dind:2375
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - branding_uploads:/var/www/html/public/uploads/branding
    ports:
      - "${PANEL_HTTP_BIND:-127.0.0.1}:${PANEL_HTTP_PORT:-8082}:80"

  redis:
    image: redis:7-alpine
    container_name: amnezia-panel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  routing-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amnezia-panel-routing-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in .env}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    command: ["php", "/var/www/html/bin/routing_worker.php"]

  routing-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amnezia-panel-routing-scheduler
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in .env}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    command: ["php", "/var/www/html/bin/routing_reconcile.php"]

  dind:
    image: docker:24-dind
    container_name: amnezia-panel-dind
    privileged: true
    restart: unless-stopped
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false", "--dns=8.8.8.8", "--dns=1.1.1.1", "--mtu=1200"]
    volumes:
      - dind_data:/var/lib/docker

volumes:
  db_data:
  dind_data:
  vendor_data:
  redis_data:
  branding_uploads:
